name: Nexar CI/CD Pipeline

on:
  push:
    branches:
      - "*"

  pull_request:
    branches:
      - "*"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build Backend (sem testes)
        run: |
          cd backend
          chmod +x gradlew
          ./gradlew build -x test

      - name: Start Backend
        run: |
          JAR=$(ls backend/build/libs/*[^plain].jar | head -1)
          echo "Iniciando JAR: $JAR"
          nohup java -jar "$JAR" > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid
          echo "PID do backend: $(cat /tmp/backend.pid)"

      - name: Wait for Backend to be ready
        run: |
          echo "Aguardando backend ficar disponível..."
          for i in {1..30}; do
          if curl -s http://localhost:8080/api/health > /dev/null 2>&1; then
           echo "Backend está disponível após $i tentativas!"
           exit 0
          fi
          echo "Tentativa $i/30 - aguardando 5 segundos..."
          sleep 5
          done
          echo "=== LOG DO BACKEND ==="
          cat /tmp/backend.log
          echo "Backend não ficou disponível após 150 segundos"
          exit 1

      - name: Run Tests
        run: |
          cd backend
          ./gradlew test

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Docker Build
        run: docker build -t nexar-app .

  # NOVO JOB: Deploy para Staging
  deploy-staging:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Simulando Deploy em Staging
        run: |
          echo "Fazendo deploy no ambiente de STAGING..."
          echo "Deploy de nexar-app concluído em staging.nexar.com"

  # NOVO JOB: Deploy para Produção
  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Simulando Deploy em Produção
        run: |
          echo "Fazendo deploy no ambiente de PRODUÇÃO..."
          echo "Deploy de nexar-app concluído em app.nexar.com"
name: Nexar CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build Backend and Run Tests
      run: |
        cd backend
        mvn clean package

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Build Frontend
      run: |
        cd frontend
        npm install
        npm run build

    - name: Docker Build
      run: docker build -t nexar-app .

  # NOVO JOB: Deploy para Staging
  deploy-staging:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Simulando Deploy em Staging
        run: |
          echo "Fazendo deploy no ambiente de STAGING..."
          echo "Deploy de nexar-app concluído em staging.nexar.com"

  # NOVO JOB: Deploy para Produção
  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    # opicional: exigir aprovação manual nas configurações do GitHub
    steps:
      - name: Simulando Deploy em Produção
        run: |
          echo "Fazendo deploy no ambiente de PRODUÇÃO..."
          echo "Deploy de nexar-app concluído em app.nexar.com"